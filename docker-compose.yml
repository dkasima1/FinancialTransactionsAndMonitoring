version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ftm-postgres
    environment:
      POSTGRES_DB: ftm_db
      POSTGRES_USER: ftm_user
      POSTGRES_PASSWORD: ftm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ftm_user -d ftm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
